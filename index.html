<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IsoSoluções - Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="container header-container">
            <img src="Logo.png" alt="Logo IsoSoluções" class="logo">
            <div class="search-bar">
                <input type="text" placeholder="Buscar produtos...">
                <button>&#x1F50D;</button> <!-- Ícone de Lupa -->
            </div>
        </div>
    </header>

    <main class="container">
        <div class="controls-container">
            <h1 class="main-title">Nossos Produtos</h1>
            <div id="filter-container" class="filter-container">
                <!-- Botões de filtro serão inseridos aqui -->
            </div>
        </div>
        <div id="product-grid" class="product-grid">
            <!-- Os produtos serão inseridos aqui pelo app.js -->
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 IsoSoluções. Todos os direitos reservados.</p>
    </footer>

    <!-- Modal Structure -->
    <div id="modal-container" class="modal-container">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <div id="modal-body">
                <!-- Conteúdo do produto será inserido aqui -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
